name: Build & Test
permissions:
  contents: read
  pull-requests: write

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  CI: "true"
  DO_NOT_TRACK: "1"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun i
      - run: bun run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: packages/*/dist/**
          retention-days: 1

  test-bun:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun i
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: packages
      - name: Run tests via bun
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun run test:bun

  test-vitest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun i
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: packages
      - name: Run tests via vitest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun run test:vitest
      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2

  cleanup:
    runs-on: ubuntu-latest
    needs: [test-bun, test-vitest]

    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: build-output
